steps:
# 1️⃣ Terraform Init
- id: "terraform-init"
  name: hashicorp/terraform:1.6
  entrypoint: sh
  dir: environments/prod
  args:
    - -c
    - terraform init

# 2️⃣ Terraform Format Check
- id: "terraform-fmt"
  name: hashicorp/terraform:1.6
  entrypoint: sh
  dir: environments/prod
  args:
    - -c
    - terraform fmt -check -recursive

# 3️⃣ Terraform Validate
- id: "terraform-validate"
  name: hashicorp/terraform:1.6
  entrypoint: sh
  dir: environments/prod
  args:
    - -c
    - terraform validate

# 4️⃣ Terraform Plan
- id: "terraform-plan"
  name: hashicorp/terraform:1.6
  entrypoint: sh
  dir: environments/prod
  args:
    - -c
    - terraform plan -out=tfplan

# 5️⃣ Terraform Apply (Only for main branch)
- id: "terraform-apply"
  name: hashicorp/terraform:1.6
  entrypoint: sh
  dir: environments/prod
  args:
    - -c
    - terraform apply -auto-approve tfplan
