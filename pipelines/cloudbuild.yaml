steps:
  # 1. Initialize Terraform
  - name: 'hashicorp/terraform:1.6.0'
    args: ['init']
    dir: 'environments/prod'

  # 2. Plan (Checks for changes)
  - name: 'hashicorp/terraform:1.6.0'
    args: 
      - 'plan'
      - '-var=my_ip=${_MY_IP}'
      - '-out=tfplan'
    dir: 'environments/prod'

  # 3. Apply (Executes only on main branch)
  - name: 'hashicorp/terraform:1.6.0'
    args: ['apply', '-auto-approve', 'tfplan']
    dir: 'environments/prod'

substitutions:
  _MY_IP: '0.0.0.0/0' # Override this in the Cloud Build Trigger settings

options:
  logging: CLOUD_LOGGING_ONLY



